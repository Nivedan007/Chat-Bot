<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Chat Bot</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg-1: #eef3ea;
			--bg-2: #dce5d4;
			--panel: #f6f8f3;
			--sidebar: #e8efe2;
			--panel-border: rgba(32, 45, 31, 0.12);
			--ink: #1f2a1e;
			--muted: #5a6857;
			--assistant: #ffffff;
			--user: #d8e8cf;
			--composer: #ffffff;
			--accent: #294d35;
			--accent-hover: #213d2b;
			--shadow: 0 12px 28px rgba(23, 39, 22, 0.11);
			--radius: 24px;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Manrope", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 20% 15%, rgba(97, 130, 83, 0.2) 0%, transparent 35%),
				radial-gradient(circle at 85% 8%, rgba(163, 182, 140, 0.26) 0%, transparent 30%),
				linear-gradient(160deg, var(--bg-1), var(--bg-2));
			display: flex;
			justify-content: center;
			padding: 18px;
		}

		.app {
			width: min(1100px, 100%);
			height: calc(100vh - 36px);
			border: 1px solid var(--panel-border);
			border-radius: 30px;
			box-shadow: var(--shadow);
			background: var(--panel);
			display: flex;
			overflow: hidden;
			backdrop-filter: blur(4px);
		}

		.sidebar {
			width: 290px;
			border-right: 1px solid var(--panel-border);
			background: var(--sidebar);
			display: flex;
			flex-direction: column;
			padding: 14px;
			gap: 12px;
		}

		.new-chat {
			border: 0;
			padding: 12px 14px;
			border-radius: 14px;
			background: var(--accent);
			color: #fff;
			font: inherit;
			font-weight: 700;
			cursor: pointer;
		}

		.history-list {
			overflow-y: auto;
			display: flex;
			flex-direction: column;
			gap: 8px;
			padding-right: 2px;
		}

		.history-item {
			text-align: left;
			border: 1px solid var(--panel-border);
			background: rgba(255, 255, 255, 0.75);
			color: var(--ink);
			padding: 10px 12px;
			border-radius: 12px;
			cursor: pointer;
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		.history-item.active {
			border-color: #446448;
			background: #f6fbf2;
		}

		.history-title {
			font-size: 14px;
			font-weight: 600;
			line-height: 1.3;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.history-time {
			font-size: 12px;
			color: var(--muted);
		}

		.workspace {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-width: 0;
		}

		.topbar {
			padding: 18px 24px;
			border-bottom: 1px solid var(--panel-border);
			display: flex;
			justify-content: space-between;
			align-items: center;
			background: rgba(255, 255, 255, 0.55);
		}

		.title {
			margin: 0;
			font-family: "Space Grotesk", sans-serif;
			letter-spacing: 0.3px;
			font-size: 26px;
			font-weight: 700;
		}

		.chat-label {
			font-size: 13px;
			color: var(--muted);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 320px;
		}

		.chatbox {
			flex: 1;
			overflow-y: auto;
			padding: 30px 18px 18px;
			display: flex;
			flex-direction: column;
			gap: 12px;
			scroll-behavior: smooth;
		}

		.message {
			max-width: min(740px, 92%);
			padding: 12px 15px;
			border-radius: 18px;
			line-height: 1.5;
			white-space: pre-wrap;
			word-break: break-word;
			animation: reveal 220ms ease-out;
		}

		.message.assistant {
			align-self: flex-start;
			background: var(--assistant);
			border: 1px solid var(--panel-border);
		}

		.message.user {
			align-self: flex-end;
			background: var(--user);
			border: 1px solid rgba(57, 89, 48, 0.18);
		}

		.message.error {
			border-color: #9d3d3d;
			color: #6f1f1f;
			background: #f9e4e4;
		}

		.empty {
			margin: auto;
			text-align: center;
			color: var(--muted);
			max-width: 480px;
			padding: 18px;
		}

		.empty h2 {
			margin: 0 0 8px;
			font-family: "Space Grotesk", sans-serif;
			font-size: 38px;
			color: var(--ink);
		}

		.composer-wrap {
			padding: 16px;
			border-top: 1px solid var(--panel-border);
			background: rgba(246, 248, 243, 0.85);
		}

		.composer {
			margin: 0 auto;
			width: min(900px, 100%);
			display: flex;
			align-items: center;
			gap: 10px;
			border: 1px solid var(--panel-border);
			border-radius: var(--radius);
			padding: 8px;
			background: var(--composer);
			box-shadow: 0 2px 10px rgba(27, 45, 23, 0.08);
			position: relative;
		}

		.plus {
			width: 38px;
			height: 38px;
			border: 1px solid var(--panel-border);
			border-radius: 50%;
			background: #f3f7ef;
			color: var(--muted);
			font-size: 25px;
			line-height: 1;
			cursor: pointer;
		}

		.composer-actions {
			position: absolute;
			left: 8px;
			bottom: 54px;
			min-width: 220px;
			padding: 8px;
			background: #ffffff;
			border: 1px solid var(--panel-border);
			border-radius: 14px;
			box-shadow: 0 12px 22px rgba(26, 40, 22, 0.14);
			display: none;
			z-index: 20;
		}

		.composer-actions.open {
			display: block;
		}

		.action-item {
			width: 100%;
			text-align: left;
			border: 0;
			background: transparent;
			font: inherit;
			padding: 8px 10px;
			border-radius: 10px;
			color: var(--ink);
			cursor: pointer;
		}

		.action-item:hover {
			background: #edf4e8;
		}

		.mode-badge {
			border: 1px solid var(--panel-border);
			background: #f3f8ee;
			font-size: 12px;
			padding: 6px 10px;
			border-radius: 999px;
			color: var(--ink);
			white-space: nowrap;
		}

		.context-hint {
			margin: 8px auto 0;
			width: min(900px, 100%);
			font-size: 12px;
			color: var(--muted);
			min-height: 16px;
		}

		.input {
			border: 0;
			outline: 0;
			flex: 1;
			font: inherit;
			color: var(--ink);
			font-size: 16px;
			background: transparent;
		}

		.input::placeholder {
			color: #8d9988;
		}

		.send {
			width: 38px;
			height: 38px;
			border: 0;
			border-radius: 50%;
			background: var(--accent);
			color: #ffffff;
			font-size: 18px;
			cursor: pointer;
			transition: transform 0.16s ease, background 0.16s ease;
		}

		.send:hover {
			background: var(--accent-hover);
			transform: translateY(-1px);
		}

		.send:disabled {
			cursor: not-allowed;
			background: #81947f;
			transform: none;
		}

		@keyframes reveal {
			from {
				opacity: 0;
				transform: translateY(8px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 700px) {
			body {
				padding: 0;
			}

			.app {
				height: 100vh;
				border-radius: 0;
				border-left: 0;
				border-right: 0;
				flex-direction: column;
			}

			.sidebar {
				width: 100%;
				border-right: 0;
				border-bottom: 1px solid var(--panel-border);
				padding: 10px;
				gap: 8px;
			}

			.history-list {
				flex-direction: row;
				overflow-x: auto;
				overflow-y: hidden;
			}

			.history-item {
				min-width: 200px;
			}

			.title {
				font-size: 22px;
			}

			.empty h2 {
				font-size: 28px;
			}
		}
	</style>
</head>
<body>
	<div class="app">
		<aside class="sidebar">
			<button id="newChatBtn" class="new-chat" type="button">+ New Chat</button>
			<div id="historyList" class="history-list"></div>
		</aside>

		<section class="workspace">
			<header class="topbar">
				<h1 class="title">Chat Bot</h1>
				<div id="currentChatTitle" class="chat-label">New conversation</div>
			</header>

			<main id="chatbox" class="chatbox">
				<section class="empty" id="emptyState">
					<h2>What can I help with?</h2>
					<p>Ask anything to start your chat.</p>
				</section>
			</main>

			<div class="composer-wrap">
				<form id="chatForm" class="composer">
					<button id="plusBtn" type="button" class="plus" aria-label="Open actions">+</button>
					<div id="actionsMenu" class="composer-actions" aria-hidden="true">
						<button type="button" class="action-item" data-action="add-files">Add photos &amp; files</button>
						<button type="button" class="action-item" data-action="create-image">Create image</button>
						<button type="button" class="action-item" data-action="thinking">Thinking</button>
						<button type="button" class="action-item" data-action="deep-research">Deep research</button>
						<button type="button" class="action-item" data-action="shopping-research">Shopping research</button>
					</div>
					<input id="attachmentInput" type="file" accept="image/*,.pdf,.txt,.md,.json,.csv" multiple hidden>
					<input
						id="message"
						class="input"
						type="text"
						placeholder="Ask anything"
						autocomplete="off"
						required
					>
					<div id="modeBadge" class="mode-badge">Mode: Chat</div>
					<button id="sendBtn" class="send" type="submit" aria-label="Send">
						&#8593;
					</button>
				</form>
				<div id="contextHint" class="context-hint"></div>
			</div>
		</section>
	</div>

	<script src="/static/script.js"></script>
</body>
</html>
